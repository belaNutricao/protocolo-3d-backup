<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@1,400;1,500;1,600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  html,body{margin:0;}
  .card{box-sizing:border-box;width:700px;padding:26px 30px;
    background:linear-gradient(180deg,#ffffff 0%,#fef4f8 100%);}
  .lbl{font-family:'Manrope';font-weight:600;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#E81C92;margin:0 0 18px;}
</style></head><body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
<symbol id="drop" viewBox="0 0 24 32"><path d="M12 2 C 8 13 3 17 3 22 a9 9 0 0 0 18 0 C 21 17 16 13 12 2 z" fill="currentColor"></path></symbol>
</defs></svg>
<div class="card">
<div class="lbl">Callouts (4 severities)</div>
<div style="display:flex;flex-direction:column;gap:10px;">
<div class="callout"><span class="icon warn">!</span><div class="body"><span class="title warn">Atenção</span>Beba água com uma pitada de sal durante o jejum.</div></div>
<div class="callout danger"><span class="icon">!</span><div class="body"><span class="title">Cuidado</span>Nunca altere a medicação por conta própria.</div></div>
<div class="callout safe"><span class="icon">i</span><div class="body"><span class="title">Tudo certo</span>Glicemia estável é o seu objetivo da semana.</div></div>
</div></div></body></html>
