<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@1,400;1,500;1,600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/bela-style.css">
<style>
  html,body{margin:0;background:#fff;}
  .card{box-sizing:border-box;width:700px;padding:26px 30px;font-family:'Manrope',sans-serif;
    background:linear-gradient(180deg,#ffffff 0%,#fef4f8 100%);} 
  .swatch-row{display:flex;gap:14px;flex-wrap:wrap;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{width:120px;height:64px;border-radius:12px;border:1px solid rgba(15,15,15,.06);}
  .sw .nm{font-size:12px;font-weight:600;color:#0F0F0F;}
  .sw .hx{font-size:11px;color:#595959;font-feature-settings:"tnum";letter-spacing:.02em;}
  .lbl{font-family:'Manrope';font-weight:600;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#E81C92;margin:0 0 16px;}
</style></head><body><div class="card">
<div class="lbl">Radii & Elevation</div>
<div style="display:flex;gap:18px;align-items:flex-end;">
<div class="sw"><div style="width:96px;height:60px;background:linear-gradient(180deg,#FDEFF4,#FCE1EB);border-radius:14px;"></div><div class="nm">Card · 14px</div></div>
<div class="sw"><div style="width:96px;height:60px;background:#fff;border:1px solid #E8D5DC;border-radius:12px;"></div><div class="nm">Chip · 12px</div></div>
<div class="sw"><div style="width:120px;height:40px;background:#E81C92;border-radius:999px;"></div><div class="nm">Pill · full</div></div>
<div class="sw"><div style="width:96px;height:60px;background:#fff;border-radius:14px;box-shadow:0 6px 30px rgba(15,15,15,.12),0 1px 3px rgba(15,15,15,.06);"></div><div class="nm">Page shadow</div></div>
</div></div></body></html>
