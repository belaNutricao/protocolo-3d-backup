<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Kit · Jejum Glicêmico 2D — Materiais do Desafio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@1,400;1,500;1,600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/bela-style.css">
<style>
  body { background: #cfc7cb; }
  .cover-eyebrow { top: 46mm; }
  .demo-cover-title {
    position: absolute; top: 88mm; left: var(--pad-x); right: var(--pad-x);
    text-align: center; font-family: var(--serif); font-style: italic; font-weight: 400;
    font-size: 62pt; line-height: 1; margin: 0; letter-spacing: -0.02em;
  }
  .demo-cover-title .l1 { display: block; color: var(--ink); }
  .demo-cover-title .l2 { display: block; color: var(--accent); }
  .demo-cover-sub {
    position: absolute; top: 138mm; left: var(--pad-x); right: var(--pad-x);
    text-align: center; font-family: var(--sans); font-size: 16pt; line-height: 1.45;
    color: var(--body); max-width: 150mm; margin: 0 auto;
  }
  .cover-sticker { position: absolute; top: 168mm; right: 24mm; z-index: 5; }
  .section-gap { height: 6mm; }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="drop" viewBox="0 0 24 32"><path d="M12 2 C 8 13 3 17 3 22 a9 9 0 0 0 18 0 C 21 17 16 13 12 2 z" fill="currentColor"></path></symbol>
  <symbol id="drop-outline" viewBox="0 0 24 32"><path d="M12 2 C 8 13 3 17 3 22 a9 9 0 0 0 18 0 C 21 17 16 13 12 2 z" fill="none" stroke="currentColor" stroke-width="2"></path></symbol>
</defs></svg>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Components.jsx"></script>

<script type="text/babel">
const { Pill, PageHeader, PageFooter, Page, H1, Callout, NumCard, Tip,
        ScheduleRow, DietCard, Stat, PullQuote, Sticker, DropList } = window;

function CoverDemo() {
  return (
    <Page className="cover">
      <div className="cover-top"><img className="logo-big" src="../../assets/logo.webp" alt="" /></div>
      <div className="cover-divider"></div>
      <div className="cover-eyebrow">Material Oficial · Turma 07 · 2026</div>
      <h1 className="demo-cover-title"><span className="l1">Cronograma</span><span className="l2">Oficial.</span></h1>
      <p className="demo-cover-sub">Seu mapa de 7 dias rumo à glicemia de 2 dígitos, com mais energia e sem medo do diabetes.</p>
      <div className="cover-sticker"><Sticker top="glicemia de" big="2 dígitos" bot="em 7 dias" size={140} /></div>
      <PageFooter />
    </Page>
  );
}

function ContentDemo() {
  return (
    <Page>
      <PageHeader />
      <div className="page-body">
        <H1 accent=" às 7h">Cronograma das Aulas</H1>
        <div className="schedule" style={{marginTop:'4mm'}}>
          <ScheduleRow day="SEG" title="O Raio-X da sua Saúde" desc="Descubra a verdade escondida do seu corpo e tome o controle." />
          <ScheduleRow day="TER" title="Corpo em Alerta" desc="Identifique os alertas do seu metabolismo a tempo." />
          <ScheduleRow day="QUA" title="Alimento Sob Controle" desc="Transforme cada refeição num passo rumo à liberdade." />
          <ScheduleRow day="QUI" title="Transformação Real" desc="Liberte-se do peso do diabetes com energia e confiança." />
        </div>
        <div className="section-gap"></div>
        <Callout kind="info" icon="i" title="Lembre-se">
          As aulas ao vivo são o coração do desafio. Esteja pronto(a) às <strong>7h em ponto</strong>.
        </Callout>
      </div>
      <PageFooter num="7 / 10" />
    </Page>
  );
}

function ComponentsDemo() {
  return (
    <Page>
      <PageHeader />
      <div className="page-body">
        <H1>Componentes</H1>
        <div className="stats-row" style={{marginTop:'4mm'}}>
          <Stat value="2 díg." label="Glicemia alvo" />
          <Stat value="7 dias" label="De desafio" />
          <Stat value="+1000" label="Pessoas ajudadas" />
        </div>
        <div className="section-gap"></div>
        <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
          <DietCard color="azul" name="Dieta Azul">Cuidado extra para controlar a glicemia.</DietCard>
          <DietCard color="verde" name="Dieta Verde">Recomeço cheio de vitalidade.</DietCard>
        </div>
        <div className="section-gap"></div>
        <Tip n="01" title="Escute seu corpo">Se sentir fome, você pode aumentar a quantidade de alimentos da sua dieta.</Tip>
        <div className="section-gap"></div>
        <PullQuote>Vamos juntos virar a chave do seu metabolismo</PullQuote>
      </div>
      <PageFooter num="8 / 10" />
    </Page>
  );
}

function App() {
  return (
    <div className="pages">
      <CoverDemo />
      <ContentDemo />
      <ComponentsDemo />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
